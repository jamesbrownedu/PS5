<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dashboard - PS5 Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');

        :root { --ps-blue: #0070d1; --ps-bg: #1f1f1f; }

        body { margin:0; padding:0; font-family:'Inter',sans-serif; background-color:#000; color:white; overflow:hidden; height:100vh; user-select:none; }

        #bg-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; transition:background 0.8s ease-in-out,transform 1.5s ease-out; background-size:cover; background-position:center; filter:brightness(0.4) saturate(1.2); transform:scale(1.05); }
        .bg-zoom { transform:scale(1.1) !important; }
        .header-gradient { background:linear-gradient(to bottom,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0) 100%); }

        .game-tile { position:relative; width:140px; height:140px; border-radius:12px; transition:all 0.3s cubic-bezier(0.25,1,0.5,1); cursor:pointer; border:2px solid transparent; background:#2a2a2a; flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .game-tile.focused { transform:scale(1.15); border-color:rgba(255,255,255,0.9); box-shadow:0 10px 30px rgba(0,0,0,0.5),0 0 15px rgba(255,255,255,0.2); z-index:10; }
        .game-tile img { width:100%; height:100%; object-fit:cover; display:block; }
        .game-tile img.game-logo { width:85%; height:85%; object-fit:contain; }

        .game-title-popup { position:absolute; bottom:-40px; left:50%; transform:translateX(-50%); white-space:nowrap; opacity:0; transition:opacity 0.2s; font-size:14px; font-weight:500; text-shadow:0 2px 4px rgba(0,0,0,0.5); }
        .game-tile.focused .game-title-popup { opacity:1; }

        .selection-glow { position:absolute; inset:-4px; border-radius:16px; border:2px solid white; opacity:0; pointer-events:none; }
        .focused .selection-glow { animation:pulse 2s infinite; opacity:1; }
        @keyframes pulse { 0%{opacity:0.4} 50%{opacity:1} 100%{opacity:0.4} }

        .scroll-container { display:flex; gap:20px; padding:20px 60px; transition:transform 0.6s cubic-bezier(0.25,1,0.5,1); align-items:center; }

        .media-btn { position:relative; padding:8px 16px; font-size:20px; color:#999; transition:color 0.3s; cursor:pointer; }
        .media-btn.active { color:white; font-weight:bold; }
        .media-btn.active::after { content:''; position:absolute; bottom:-2px; left:50%; transform:translateX(-50%); width:20px; height:3px; background:white; border-radius:2px; }

        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-content { background:#1a1a1a; border:1px solid #333; border-radius:20px; padding:40px; width:90%; max-width:500px; transform:scale(0.9); transition:transform 0.3s ease; }
        .modal-content.max-w-2xl { max-width:700px; }
        .modal-overlay.active .modal-content { transform:scale(1); }

        .launch-screen { position:fixed; inset:0; background:black; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 1s ease; }
        .launch-screen.active { opacity:1; pointer-events:auto; }

        .placeholder { font-size: 3rem; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-black">

    <div id="bg-overlay"></div>

    <div id="search-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-content max-w-2xl" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-bold mb-4">Search Games</h2>
            <div class="relative mb-4">
                <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
                <input type="text" id="search-input" placeholder="Search games by name, type, or category..." class="w-full bg-gray-800 border border-gray-600 rounded-lg p-4 pl-12 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" oninput="performSearch()">
            </div>
            <div class="text-gray-400 text-sm mb-4" id="search-results-count">Type to search...</div>
            <div id="search-results" class="grid grid-cols-3 gap-4 max-h-80 overflow-y-auto">
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-bold mb-6">Settings</h2>
            <div class="space-y-4">
                <div class="p-3 bg-gray-800 rounded-lg flex justify-between cursor-pointer hover:bg-gray-700" onclick="toggleModal('profile-modal')"><span>Edit Profile</span><i class="fas fa-chevron-right"></i></div>
                <div class="p-3 bg-gray-800 rounded-lg flex justify-between cursor-pointer hover:bg-gray-700"><span>Network & Sound</span><i class="fas fa-chevron-right"></i></div>
                <div class="p-3 bg-gray-800 rounded-lg flex justify-between cursor-pointer hover:bg-gray-700"><span>System Update</span><i class="fas fa-chevron-right text-green-400"></i></div>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-content max-w-2xl" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-bold mb-6">Edit Profile</h2>
            <div class="space-y-6">
                <div class="flex items-center gap-6">
                    <div class="relative">
                        <img id="profile-pic-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" alt="Profile" class="w-24 h-24 rounded-full border-2 border-blue-500">
                        <input type="file" id="profile-pic-input" accept="image/*" class="hidden">
                        <label for="profile-pic-input" class="absolute bottom-0 right-0 bg-blue-500 p-2 rounded-full cursor-pointer hover:bg-blue-600 transition">
                            <i class="fas fa-camera text-white text-sm"></i>
                        </label>
                    </div>
                    <div class="flex-1">
                        <div class="mb-4">
                            <label class="block text-sm font-semibold mb-2">Username</label>
                            <input type="text" id="profile-name" placeholder="Enter username" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:border-blue-500 outline-none">
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Bio</label>
                    <textarea id="profile-bio" placeholder="Tell us about yourself..." class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:border-blue-500 outline-none h-20 resize-none"></textarea>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-gray-800 p-4 rounded-lg text-center">
                        <div class="text-2xl font-bold text-blue-400" id="stats-played">0</div>
                        <div class="text-xs text-gray-400 mt-2">Games Played</div>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg text-center">
                        <div class="text-2xl font-bold text-green-400" id="stats-favorites">0</div>
                        <div class="text-xs text-gray-400 mt-2">Favorites</div>
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg text-center">
                        <div class="text-2xl font-bold text-purple-400" id="stats-time">0h</div>
                        <div class="text-xs text-gray-400 mt-2">Total Time</div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="saveProfile()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition">
                        <i class="fas fa-save mr-2"></i>Save Profile
                    </button>
                    <button onclick="closeModals()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-lg transition">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="launch-screen" class="launch-screen">
        <div class="w-24 h-24 mb-8">
            <svg viewBox="0 0 100 100" class="animate-pulse">
                <circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
                <path d="M50 5 L50 95 M5 50 L95 50" stroke="white" stroke-width="1" opacity="0.3"/>
            </svg>
        </div>
        <h2 id="launch-title" class="text-3xl font-light tracking-widest uppercase">Loading...</h2>
    </div>

    <header class="fixed top-0 w-full h-32 header-gradient z-50 flex justify-between items-start px-12 pt-10">
        <nav class="flex items-center space-x-8">
            <div id="btn-games" class="media-btn active" onclick="switchCategory('games')">Games</div>
            <div id="btn-media" class="media-btn" onclick="switchCategory('media')">Media</div>
            <div id="btn-browsers" class="media-btn" onclick="switchCategory('browsers')">Browsers</div>
        </nav>
        <div class="flex items-center space-x-8 text-xl">
            <i class="fas fa-search cursor-pointer hover:text-blue-400 transition" onclick="toggleModal('search-modal')"></i>
            <i class="fas fa-cog cursor-pointer hover:text-blue-400 transition" onclick="toggleModal('settings-modal')"></i>
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="toggleModal('profile-modal')">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center overflow-hidden border border-green-400 group-hover:scale-110 transition">
                    <img id="header-profile-pic" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
                </div>
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            </div>
            <div id="username-display" class="font-medium text-sm ml-2">Felix</div>
            <div id="clock" class="font-medium text-lg ml-4">4:42 PM</div>
        </div>
    </header>

    <main class="h-full flex flex-col justify-center">
        <div class="relative overflow-hidden w-full pt-20">
            <div id="game-list" class="scroll-container"></div>
        </div>
        <div class="px-16 mt-16 transition-all duration-500" id="game-info">
            <h1 id="active-title" class="text-5xl font-bold mb-2">Explore</h1>
            <p id="active-desc" class="text-gray-300 text-lg max-w-xl">Find out what's happening in the world of gaming today.</p>
            <div class="mt-8 flex space-x-4">
                <button onclick="launchCurrentGame()" class="bg-white text-black px-10 py-3 rounded-full font-bold flex items-center space-x-2 transform transition hover:scale-105 active:scale-95">
                    <i class="fas fa-play"></i><span id="btn-action-text">Start</span>
                </button>
                <button onclick="toggleModal('settings-modal')" class="bg-gray-800/80 backdrop-blur-md text-white px-6 py-3 rounded-full font-bold transform transition hover:scale-105">
                    <i class="fas fa-ellipsis-h"></i>
                </button>
            </div>
        </div>
    </main>

            'tung-tung-sahur-horror': { img:'https://2games.io/data/image/game/tung-sahur-horror/tung-sahur-horror_sq.png' },
            'ultrakill': { img:'https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1229490/library_600x900_2x.jpg' },
            'wrestle-bros': { img:'https://nealfun.app/game/baseball-bros/assets/wbro.png', isLogo:true }
        };

        const gameData = rawGameData.map(enrichGameData);

        let currentCategory = 'games', filteredGames = [], currentIndex = 0, hoverFocusTimer = null;
        const gameList = document.getElementById('game-list');
        const bgOverlay = document.getElementById('bg-overlay');
        const activeTitle = document.getElementById('active-title');
        const activeDesc = document.getElementById('active-desc');
        const gameInfo = document.getElementById('game-info');

        function init() { 
            updateProfileDisplay();
            renderTiles(); 
            updateClock(); 
            setInterval(updateClock, 1000); 
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.getElementById('btn-games').classList.toggle('active', cat === 'games');
            document.getElementById('btn-media').classList.toggle('active', cat === 'media');
            document.getElementById('btn-browsers').classList.toggle('active', cat === 'browsers');
            filteredGames = gameData.filter(g => g.type === cat);
            renderTiles();
        }

        function buildSiteIconUrl(url) {
            try { return `https://www.google.com/s2/favicons?sz=256&domain_url=${encodeURIComponent(new URL(url).origin)}`; }
            catch { return ''; }
        }

        function resolveGameAsset(baseUrl, assetUrl) {
            if (!assetUrl) return '';
            const normalized = assetUrl.replace(/^hhttps:\/\//i, 'https://').replace(/^http:\/\//i, 'https://');
            try { return new URL(normalized, baseUrl).href; }
            catch { return normalized; }
        }

        function normalizeLaunchUrl(url) {
            try {
                const parsed = new URL(url);
                if (parsed.hostname !== 'cdn.jsdelivr.net') return parsed.href;
                const path = parsed.pathname;
                const lastSegment = path.split('/').pop() || '';
                if (path.endsWith('/')) {
                    parsed.pathname += 'index.html';
                    return parsed.href;
                }
                if (!lastSegment.includes('.')) {
                    parsed.pathname += '/index.html';
                    return parsed.href;
                }
                return parsed.href;
            } catch {
                return url;
            }
        }

        function shouldInlineLaunch(url) {
            try {
                const parsed = new URL(url);
                return parsed.hostname === 'cdn.jsdelivr.net';
            } catch {
                return false;
            }
        }

        function injectBaseHref(html, baseHref) {
            const baseTag = `<base href="${baseHref}">`;
            if (/<base\s/i.test(html)) return html;
            if (/<head[^>]*>/i.test(html)) return html.replace(/<head([^>]*)>/i, `<head$1>${baseTag}`);
            return `<!DOCTYPE html><html><head>${baseTag}</head><body>${html}</body></html>`;
        }

        function renderLaunchError(doc, title, message, fallbackUrl) {
            doc.open();
            doc.write(`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>${title}</title><style>
                body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:Inter,sans-serif}
                .card{max-width:680px;padding:28px 32px;border:1px solid #2f2f2f;border-radius:18px;background:rgba(18,18,18,.96);box-shadow:0 24px 80px rgba(0,0,0,.45)}
                h1{margin:0 0 12px;font-size:28px} p{margin:0 0 16px;color:#bbb;line-height:1.5}
                a{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:999px;background:#fff;color:#000;text-decoration:none;font-weight:700}
            </style></head><body><div class="card"><h1>${title}</h1><p>${message}</p><a href="${fallbackUrl}">Open Source URL</a></div></body></html>`);
            doc.close();
        }

        async function launchInlinePage(win, title, url) {
            const sourceUrl = normalizeLaunchUrl(url);
            const response = await fetch(sourceUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const html = injectBaseHref(await response.text(), sourceUrl);
            const doc = win.document;
            doc.open();
            doc.write(html);
            doc.close();
            try { doc.title = `${title} - Launcher`; } catch {}
        }

        function enrichGameData(game) {
            if (game.type !== 'games' || game.icon) return game;
            const fallbackImg = buildSiteIconUrl(game.url);
            const override = gameIconOverrides[game.id];
            if (override?.img) {
                return {
                    ...game,
                    img: resolveGameAsset(game.url, override.img),
                    fallbackImg,
                    isLogo: Boolean(override.isLogo)
                };
            }
            if (game.placeholder) return { ...game, img: fallbackImg, fallbackImg, isLogo: true };
            return game;
        }

        function buildFallbackGameIcon() {
            const icon = document.createElement('i');
            icon.className = 'fas fa-gamepad text-4xl text-gray-500';
            return icon;
        }

        function handleImgError(img) {
            const fallback = img.dataset.fallback || '';
            if (!img.dataset.fallbackApplied && fallback && img.src !== fallback) {
                img.dataset.fallbackApplied = '1';
                img.src = fallback;
                img.classList.add('game-logo');
                return;
            }
            img.replaceWith(buildFallbackGameIcon());
        }

        function renderTiles() {
            filteredGames = gameData.filter(g => g.type === currentCategory);
            currentIndex = 0;
            gameList.innerHTML = '';
            filteredGames.forEach((game, index) => {
                const tile = document.createElement('div');
                tile.className = `game-tile ${index === 0 ? 'focused' : ''}`;
                tile.dataset.index = index;
                let innerContent = '';
                if (game.img) {
                    const imgClass = game.isLogo ? 'game-logo' : '';
                    innerContent = `<img src="${game.img}" alt="${game.title}" class="${imgClass}" data-fallback="${game.fallbackImg || ''}" onerror="handleImgError(this)">`;
                } else if (game.icon) {
                    innerContent = game.icon;
                } else if (game.placeholder) {
                    innerContent = `<div class="placeholder">${game.placeholder}</div>`;
                } else {
                    innerContent = `<i class="fas fa-gamepad text-4xl text-gray-500"></i>`;
                }
                tile.innerHTML = `${innerContent}<div class="selection-glow"></div><div class="game-title-popup">${game.title}</div>`;
                tile.addEventListener('mouseenter', () => scheduleSetFocus(index));
                tile.addEventListener('mouseleave', clearScheduledFocus);
                tile.addEventListener('click', () => launchCurrentGame());
                gameList.appendChild(tile);
            });
            gameList.addEventListener('mouseleave', clearScheduledFocus);
            updateDisplay();
        }

        function setFocus(index) {
            if (index < 0) index = 0;
            if (index >= filteredGames.length) index = filteredGames.length - 1;
            if (index === currentIndex) return;
            document.querySelectorAll('.game-tile').forEach(t => t.classList.remove('focused'));
            currentIndex = index;
            const t = document.querySelectorAll('.game-tile')[currentIndex];
            if (t) t.classList.add('focused');
            updateDisplay();
        }

        function scheduleSetFocus(index) {
            if (index === currentIndex) return;
            clearScheduledFocus();
            hoverFocusTimer = setTimeout(() => { setFocus(index); hoverFocusTimer = null; }, 140);
        }

        function clearScheduledFocus() { if (hoverFocusTimer) { clearTimeout(hoverFocusTimer); hoverFocusTimer = null; } }

        function updateDisplay() {
            const game = filteredGames[currentIndex];
            if (!game) return;
            gameInfo.style.opacity = '0';
            setTimeout(() => {
                activeTitle.innerText = game.title;
                activeDesc.innerText = game.desc;
                document.getElementById('btn-action-text').innerText = game.url ? 'Open' : 'Start';
                gameInfo.style.opacity = '1';
            }, 150);
            bgOverlay.style.backgroundImage = `url(${game.bg})`;
            bgOverlay.classList.remove('bg-zoom');
            void bgOverlay.offsetWidth;
            bgOverlay.classList.add('bg-zoom');
            const tileWidth = 160;
            const offset = 60 - (currentIndex * tileWidth);
            gameList.style.transform = `translateX(${offset}px)`;
        }

        function filterGames() {
            const search = document.querySelector('#search-input').value.toLowerCase();
            const searchResults = document.getElementById('search-results');
            searchResults.innerHTML = '';
            
            if (!search.trim()) {
                document.getElementById('search-results-count').innerText = 'Type to search...';
                return;
            }
            
            const results = gameData.filter(g => 
                g.title.toLowerCase().includes(search) || 
                g.desc.toLowerCase().includes(search)
            );
            
            document.getElementById('search-results-count').innerText = `Found ${results.length} result${results.length !== 1 ? 's' : ''}`;
            
            results.slice(0, 12).forEach(game => {
                const tile = document.createElement('div');
                tile.className = 'bg-gray-800 rounded-lg p-4 text-center cursor-pointer hover:bg-gray-700 transition transform hover:scale-105';
                tile.onclick = () => {
                    currentIndex = gameData.indexOf(game);
                    filteredGames = gameData.filter(g => g.type === currentCategory);
                    currentIndex = filteredGames.indexOf(game);
                    closeModals();
                    updateDisplay();
                    recordGamePlay(game.id);
                };
                
                let icon = '';
                if (game.img) {
                    icon = `<img src="${game.img}" alt="${game.title}" class="w-12 h-12 mx-auto mb-2 rounded object-cover">`;
                } else if (game.icon) {
                    icon = `<div class="mb-2">${game.icon}</div>`;
                } else {
                    icon = `<i class="fas fa-gamepad text-2xl text-gray-500 mb-2 block"></i>`;
                }
                
                tile.innerHTML = `${icon}<div class="text-sm font-semibold truncate">${game.title}</div>`;
                searchResults.appendChild(tile);
            });
        }

        function performSearch() {
            filterGames();
        }

        // Profile System
        const defaultProfile = {
            username: 'Felix',
            bio: 'Gaming enthusiast',
            profilePic: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix',
            gamesPlayed: 0,
            favorites: 0,
            totalTime: 0
        };

        function loadProfile() {
            const saved = localStorage.getItem('userProfile');
            return saved ? JSON.parse(saved) : { ...defaultProfile };
        }

        function saveProfile() {
            const profile = {
                username: document.getElementById('profile-name').value || 'Felix',
                bio: document.getElementById('profile-bio').value,
                profilePic: document.getElementById('profile-pic-preview').src,
                gamesPlayed: loadProfile().gamesPlayed,
                favorites: loadProfile().favorites,
                totalTime: loadProfile().totalTime
            };
            
            localStorage.setItem('userProfile', JSON.stringify(profile));
            updateProfileDisplay();
            closeModals();
        }

        function updateProfileDisplay() {
            const profile = loadProfile();
            document.getElementById('header-profile-pic').src = profile.profilePic;
            document.getElementById('username-display').innerText = profile.username;
            document.getElementById('profile-name').value = profile.username;
            document.getElementById('profile-bio').value = profile.bio;
            document.getElementById('profile-pic-preview').src = profile.profilePic;
            document.getElementById('stats-played').innerText = profile.gamesPlayed;
            document.getElementById('stats-favorites').innerText = profile.favorites;
            document.getElementById('stats-time').innerText = Math.floor(profile.totalTime / 60) + 'h';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('profile-pic-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('profile-pic-preview').src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function recordGamePlay(gameId) {
            const profile = loadProfile();
            profile.gamesPlayed += 1;
            profile.totalTime += 1;
            localStorage.setItem('userProfile', JSON.stringify(profile));
            updateProfileDisplay();
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
            if (id === 'search-modal') {
                document.getElementById('search-input').value = '';
                document.getElementById('search-results').innerHTML = '';
                document.getElementById('search-results-count').innerText = 'Type to search...';
                setTimeout(() => document.getElementById('search-input').focus(), 100);
            }
            if (id === 'profile-modal') {
                updateProfileDisplay();
            }
        }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

        async function launchCurrentGame() {
            const game = filteredGames[currentIndex];
            recordGamePlay(game.id);
            const launchScreen = document.getElementById('launch-screen');
            const launchTitle = document.getElementById('launch-title');
            launchTitle.innerText = game.url ? `Opening ${game.title}...` : `Launching ${game.title}...`;
            launchScreen.classList.add('active');
            if (game.url) {
                const launchUrl = normalizeLaunchUrl(game.url);
                const win = window.open('about:blank', '_blank');
                if (win) {
                    if (shouldInlineLaunch(launchUrl)) {
                        try {
                            await launchInlinePage(win, game.title, launchUrl);
                        } catch (error) {
                            renderLaunchError(
                                win.document,
                                `${game.title} couldn't be embedded`,
                                `This launcher couldn't boot the page inline. ${error.message}.`,
                                launchUrl
                            );
                        }
                    } else {
                        const doc = win.document;
                        doc.title = `${game.title} - Launcher`;
                        const frame = doc.createElement('iframe');
                        frame.src = launchUrl;
                        frame.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;margin:0;padding:0;overflow:hidden;';
                        frame.setAttribute('allow', 'autoplay; fullscreen; keyboard; gamepad');
                        doc.body.style.cssText = 'margin:0;padding:0;overflow:hidden;background:#000;';
                        doc.body.appendChild(frame);
                    }
                } else { window.location.href = launchUrl; }
            }
            setTimeout(() => launchScreen.classList.remove('active'), 1800);
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes();
            const ap = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock').innerText = `${h}:${m < 10 ? '0'+m : m} ${ap}`;
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') setFocus(currentIndex + 1);
            else if (e.key === 'ArrowLeft') setFocus(currentIndex - 1);
            else if (e.key === 'Enter') launchCurrentGame();
            else if (e.key === 'Escape') closeModals();
        });

        window.onload = init;
    </script>
</body>
</html>
